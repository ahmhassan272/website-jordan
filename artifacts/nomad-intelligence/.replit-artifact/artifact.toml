kind = "web"
previewPath = "/"
title = "Nomad Intelligence"
version = "1.0.0"
id = "artifacts/nomad-intelligence"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23701

[services.development]
run = "pnpm --filter @workspace/nomad-intelligence run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nomad-intelligence", "run", "build" ]
publicDir = "artifacts/nomad-intelligence/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23701"
BASE_PATH = "/"
